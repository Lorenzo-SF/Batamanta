name: CI - Smoke Tests Matrix

on:
  push:
    branches: [ main ]
    tags: [ 'v*' ]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  # ============================================================================
  # UNIT TESTS
  # ============================================================================
  unit_tests:
    name: Unit Tests (Elixir ${{ matrix.elixir }}, OTP ${{ matrix.otp }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        elixir: ['1.15.8', '1.18.4']
        otp: ['25.0', '28.0']

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Erlang/OTP and Elixir
        uses: erlef/setup-beam@v1
        with:
          elixir-version: ${{ matrix.elixir }}
          otp-version: ${{ matrix.otp }}
          install-hex: true
          install-rebar: true

      - name: Install System Dependencies
        run: sudo apt-get update && sudo apt-get install -y zstd

      - name: Install Mix Dependencies
        run: mix deps.get

      - name: Run Tests (ExUnit)
        run: mix test

      - name: Run Credo (Code Quality)
        run: mix credo --strict

  # ============================================================================
  # SMOKE TESTS - macOS
  # ============================================================================
  smoke_tests_macos:
    name: Smoke Tests macOS (${{ matrix.mode }})
    runs-on: macos-latest
    strategy:
      fail-fast: false
      matrix:
        mode: [cli, tui, daemon]

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Erlang/OTP and Elixir
        uses: erlef/setup-beam@v1
        with:
          elixir-version: '1.18.4'
          otp-version: '28.0'
          install-hex: true
          install-rebar: true

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin

      - name: Install System Dependencies
        run: brew install zstd

      - name: Install Mix Dependencies
        working-directory: smoke_tests/test_${{ matrix.mode }}
        run: mix deps.get

      - name: Build with Batamanta
        working-directory: smoke_tests/test_${{ matrix.mode }}
        run: mix batamanta --compression 1

      - name: Run Smoke Test
        run: |
          chmod +x smoke_test_runner.sh
          ./smoke_test_runner.sh smoke_tests/test_${{ matrix.mode }} ${{ matrix.mode }} 30

  # ============================================================================
  # SMOKE TESTS - Linux glibc
  # ============================================================================
  smoke_tests_linux_glibc:
    name: Smoke Tests Linux glibc (${{ matrix.mode }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        mode: [cli, tui, daemon]

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Erlang/OTP and Elixir
        uses: erlef/setup-beam@v1
        with:
          elixir-version: '1.18.4'
          otp-version: '28.0'
          install-hex: true
          install-rebar: true

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-linux-gnu

      - name: Install System Dependencies
        run: sudo apt-get update && sudo apt-get install -y zstd

      - name: Install Mix Dependencies
        working-directory: smoke_tests/test_${{ matrix.mode }}
        run: mix deps.get

      - name: Build with Batamanta
        working-directory: smoke_tests/test_${{ matrix.mode }}
        run: mix batamanta --compression 1

      - name: Run Smoke Test
        run: |
          chmod +x smoke_test_runner.sh
          ./smoke_test_runner.sh smoke_tests/test_${{ matrix.mode }} ${{ matrix.mode }} 30

  # ============================================================================
  # DOCKER MATRIX - Linux glibc/musl × OTP versions
  # ============================================================================
  docker_matrix:
    name: Docker Matrix (${{ matrix.image }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        image:
          - elixir:1.15.8-otp-25
          - elixir:1.18.4-otp-28
          - elixir:1.15.8-otp-25-alpine
          - elixir:1.18.4-otp-28-alpine

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Run Docker Test Matrix
        run: |
          chmod +x docker_matrix_simple.sh
          ./docker_matrix_simple.sh ${{ matrix.image }}

  # ============================================================================
  # COVERAGE REPORT (Linux only for max coverage)
  # ============================================================================
  coverage:
    name: Coverage Report
    runs-on: ubuntu-latest
    needs: [unit_tests]

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Erlang/OTP and Elixir
        uses: erlef/setup-beam@v1
        with:
          elixir-version: '1.18.4'
          otp-version: '28.0'
          install-hex: true
          install-rebar: true

      - name: Install System Dependencies
        run: sudo apt-get update && sudo apt-get install -y zstd

      - name: Install Mix Dependencies
        run: mix deps.get

      - name: Run Tests with Coverage
        run: mix test --cover

      - name: Upload Coverage Report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: cover/
          retention-days: 30

  # ============================================================================
  # RELEASE (only on tags)
  # ============================================================================
  release:
    name: Publish to Hex.pm
    needs: [unit_tests, smoke_tests_macos, smoke_tests_linux_glibc, docker_matrix]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - uses: actions/checkout@v4
      
      - uses: erlef/setup-beam@v1
        with:
          elixir-version: '1.18.4'
          otp-version: '28.0'
      
      - run: mix deps.get
      - run: mix compile
      - run: mix hex.build
      - run: mix hex.publish --yes
        env:
          HEX_API_KEY: ${{ secrets.HEX_API_KEY }}
