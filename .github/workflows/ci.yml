name: CI - Tests Matrix

on:
  push:
    branches: [ main, develop ]
    tags: [ 'v*' ]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  # ============================================================================
  # UNIT TESTS - Version Matrix
  # ============================================================================
  unit_tests:
    name: Unit Tests (Elixir ${{ matrix.elixir }}, OTP ${{ matrix.otp }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          # Edge versions
          - elixir: '1.15.8'
            otp: '25.3.2'
          # Latest versions
          - elixir: '1.18.4'
            otp: '28.1'

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Erlang/OTP and Elixir
        uses: erlef/setup-beam@v1
        with:
          elixir-version: ${{ matrix.elixir }}
          otp-version: ${{ matrix.otp }}
          install-hex: true
          install-rebar: true

      - name: Install System Dependencies
        run: sudo apt-get update && sudo apt-get install -y zstd

      - name: Install Mix Dependencies
        run: mix deps.get

      - name: Run Tests (ExUnit)
        run: mix test --exclude integration

      - name: Run Credo (Code Quality)
        run: mix credo --strict

  # ============================================================================
  # SMOKE TESTS - Linux AMD64 glibc
  # ============================================================================
  smoke_tests_linux_amd64_glibc:
    name: Smoke Tests Linux AMD64 glibc (${{ matrix.mode }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        mode: [cli, tui, daemon, escript]
        elixir: ['1.18.4']
        otp: ['28.1']

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Erlang/OTP and Elixir
        uses: erlef/setup-beam@v1
        with:
          elixir-version: ${{ matrix.elixir }}
          otp-version: ${{ matrix.otp }}
          install-hex: true
          install-rebar: true

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-linux-gnu

      - name: Install System Dependencies
        run: sudo apt-get update && sudo apt-get install -y zstd

      - name: Install Mix Dependencies
        working-directory: smoke_tests/test_${{ matrix.mode }}
        run: mix deps.get

      - name: Clean build artifacts
        run: |
          rm -rf _build deps
          rm -rf ~/.cache/batamanta
          rm -f /tmp/batama* 2>/dev/null || true

      - name: Build with Batamanta
        working-directory: smoke_tests/test_${{ matrix.mode }}
        run: |
          if [ "${{ matrix.mode }}" = "escript" ]; then
            mix batamanta --format escript --compression 1
          else
            mix batamanta --compression 1
          fi

      - name: Run Smoke Test
        run: |
          chmod +x smoke_test_runner.sh
          ./smoke_test_runner.sh smoke_tests/test_${{ matrix.mode }} ${{ matrix.mode }} 30

  # ============================================================================
  # COVERAGE REPORT
  # ============================================================================
  coverage:
    name: Coverage Report
    runs-on: ubuntu-latest
    needs: [unit_tests]

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Erlang/OTP and Elixir
        uses: erlef/setup-beam@v1
        with:
          elixir-version: '1.18.4'
          otp-version: '28.1'
          install-hex: true
          install-rebar: true

      - name: Install System Dependencies
        run: sudo apt-get update && sudo apt-get install -y zstd

      - name: Install Mix Dependencies
        run: mix deps.get

      - name: Run Tests with Coverage
        run: mix test --cover --exclude integration

      - name: Upload Coverage Report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: cover/
          retention-days: 30

  # ============================================================================
  # RELEASE (only on tags)
  # ============================================================================
  release:
    name: Publish to Hex.pm
    needs: [unit_tests, smoke_tests_linux_amd64_glibc]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - uses: actions/checkout@v4

      - uses: erlef/setup-beam@v1
        with:
          elixir-version: '1.18.4'
          otp-version: '28.1'

      - run: mix deps.get
      - run: mix compile
      - run: mix hex.build
      - run: mix hex.publish --yes
        env:
          HEX_API_KEY: ${{ secrets.HEX_API_KEY }}
