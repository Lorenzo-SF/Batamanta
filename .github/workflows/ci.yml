name: CI

on:
  push:
    branches: [main, develop]
    tags: ['v*']
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

env:
  MIX_ENV: test

jobs:
  # ============================================================================
  # UNIT TESTS - Version Matrix
  # ============================================================================
  unit_tests:
    name: Unit Tests (Elixir ${{ matrix.elixir }}, OTP ${{ matrix.otp }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - elixir: '1.15.8'
            otp: '26.2.5'
          - elixir: '1.19.5'
            otp: '28.1'

    steps:
      - uses: actions/checkout@v4

      - name: Setup Erlang/OTP and Elixir
        uses: erlef/setup-beam@v1
        with:
          elixir-version: ${{ matrix.elixir }}
          otp-version: ${{ matrix.otp }}
          install-hex: true
          install-rebar: true

      - name: Cache Mix dependencies
        uses: actions/cache@v4
        with:
          key: mix-${{ runner.os }}-${{ matrix.otp }}-${{ matrix.elixir }}-${{ hashFiles('mix.lock') }}
          restore-keys: mix-${{ runner.os }}-${{ matrix.otp }}-${{ matrix.elixir }}-
          path: |
            deps/
            _build/${{ env.MIX_ENV }}

      - name: Install System Dependencies
        run: sudo apt-get update && sudo apt-get install -y zstd

      - name: Install Mix Dependencies
        run: mix deps.get

      - name: Run Tests
        run: mix test --exclude integration

      - name: Run Credo
        run: mix credo --strict

  # ============================================================================
  # SMOKE TESTS
  # ============================================================================
  smoke_tests:
    name: Smoke Test (${{ matrix.mode }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        mode: [cli, tui, daemon, escript]

    steps:
      - uses: actions/checkout@v4

      - name: Setup Erlang/OTP and Elixir
        uses: erlef/setup-beam@v1
        with:
          elixir-version: '1.18.4'
          otp-version: '28.1'
          install-hex: true
          install-rebar: true

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-linux-gnu

      - name: Cache Cargo dependencies
        uses: actions/cache@v4
        with:
          key: cargo-${{ runner.os }}-${{ hashFiles('priv/rust_template/Cargo.lock') }}
          restore-keys: cargo-${{ runner.os }}-
          path: |
            ~/.cargo/registry/
            ~/.cargo/git/

      - name: Install System Dependencies
        run: sudo apt-get update && sudo apt-get install -y zstd

      - name: Clean cached ERTS
        run: rm -rf ~/.cache/batamanta

      - name: Install Mix Dependencies
        working-directory: smoke_tests/test_${{ matrix.mode }}
        run: mix deps.get

      - name: Build with Batamanta
        working-directory: smoke_tests/test_${{ matrix.mode }}
        run: |
          if [ "${{ matrix.mode }}" = "escript" ]; then
            mix batamanta --format escript --compression 1
          else
            mix batamanta --compression 1
          fi

      - name: Upload Binary Artifact
        uses: actions/upload-artifact@v4
        with:
          name: batamanta-binary-${{ matrix.mode }}
          path: smoke_tests/test_${{ matrix.mode }}/*.run
          retention-days: 7
          if-no-files-found: ignore

      - name: Run Smoke Test
        run: |
          chmod +x smoke_test_runner.sh
          ./smoke_test_runner.sh smoke_tests/test_${{ matrix.mode }} ${{ matrix.mode }} 30

  # ============================================================================
  # COVERAGE
  # ============================================================================
  coverage:
    name: Coverage
    runs-on: ubuntu-latest
    needs: [unit_tests]

    steps:
      - uses: actions/checkout@v4

      - name: Setup Erlang/OTP and Elixir
        uses: erlef/setup-beam@v1
        with:
          elixir-version: '1.18.4'
          otp-version: '28.1'
          install-hex: true
          install-rebar: true

      - name: Cache Mix dependencies
        uses: actions/cache@v4
        with:
          key: mix-${{ runner.os }}-28.1-1.18.4-${{ hashFiles('mix.lock') }}
          restore-keys: mix-${{ runner.os }}-28.1-1.18.4-
          path: |
            deps/
            _build/${{ env.MIX_ENV }}

      - name: Install System Dependencies
        run: sudo apt-get update && sudo apt-get install -y zstd

      - name: Install Mix Dependencies
        run: mix deps.get

      - name: Run Tests with Coverage
        run: mix test --cover --exclude integration

      - name: Upload Coverage Report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: cover/
          retention-days: 30

  # ============================================================================
  # RELEASE (tags only)
  # ============================================================================
  release:
    name: Publish to Hex.pm
    needs: [unit_tests, smoke_tests]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - uses: actions/checkout@v4

      - uses: erlef/setup-beam@v1
        with:
          elixir-version: '1.18.4'
          otp-version: '28.1'

      - run: mix deps.get
      - run: mix compile
      - run: mix hex.build
      - run: mix hex.publish --yes
        env:
          HEX_API_KEY: ${{ secrets.HEX_API_KEY }}
