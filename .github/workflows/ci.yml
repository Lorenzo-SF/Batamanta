name: CI - Smoke Tests Matrix

on:
  push:
    branches: [ main ]
    tags: [ 'v*' ]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  # ============================================================================
  # UNIT TESTS
  # ============================================================================
  unit_tests:
    name: Unit Tests (Elixir ${{ matrix.elixir }}, OTP ${{ matrix.otp }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        elixir: ['1.15.8']
        otp: ['25.0', '26.0']
        include:
          - elixir: '1.19.5'
            otp: '27.0'
          - elixir: '1.19.5'
            otp: '28.0'

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Erlang/OTP and Elixir
        uses: erlef/setup-beam@v1
        with:
          elixir-version: ${{ matrix.elixir }}
          otp-version: ${{ matrix.otp }}
          install-hex: false
          install-rebar: true

      - name: Install Hex (OTP 28 compatible version)
        run: |
          mix archive.uninstall hex.ez --force 2>/dev/null || true
          mix archive.uninstall hex --force 2>/dev/null || true
          mix local.hex --force
          mix local.hex --force

      - name: Install System Dependencies
        run: sudo apt-get update && sudo apt-get install -y zstd

      - name: Install Mix Dependencies
        run: mix deps.get

      - name: Run Tests (ExUnit)
        run: mix test

      - name: Run Credo (Code Quality)
        run: mix credo --strict

  # ============================================================================
  # SMOKE TESTS - macOS (x86_64 & arm64)
  # ============================================================================
  smoke_tests_macos:
    name: Smoke Tests macOS ${{ matrix.arch }} (Elixir ${{ matrix.elixir }}, OTP ${{ matrix.otp }}, ${{ matrix.mode }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest]
        arch: ['arm64']
        elixir: ['1.15.8', '1.19.5']
        otp: ['25.0', '28.0']
        mode: [cli, tui, daemon]

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Erlang/OTP and Elixir
        uses: erlef/setup-beam@v1
        with:
          elixir-version: ${{ matrix.elixir }}
          otp-version: ${{ matrix.otp }}
          install-hex: false
          install-rebar: true

      - name: Install Hex (OTP 28 compatible version)
        run: |
          mix archive.uninstall hex.ez --force 2>/dev/null || true
          mix archive.uninstall hex --force 2>/dev/null || true
          mix local.hex --force
          mix local.hex --force

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin

      - name: Install System Dependencies
        run: brew install zstd

      - name: Install Mix Dependencies
        working-directory: smoke_tests/test_${{ matrix.mode }}
        run: mix deps.get

      - name: Build with Batamanta
        working-directory: smoke_tests/test_${{ matrix.mode }}
        run: mix batamanta --compression 1

      - name: Run Smoke Test
        run: |
          chmod +x smoke_test_runner.sh
          ./smoke_test_runner.sh smoke_tests/test_${{ matrix.mode }} ${{ matrix.mode }} 30

  # ============================================================================
  # SMOKE TESTS - Linux AMD64 glibc
  # ============================================================================
  smoke_tests_linux_amd64_glibc:
    name: Smoke Tests Linux AMD64 glibc (Elixir ${{ matrix.elixir }}, OTP ${{ matrix.otp }}, ${{ matrix.mode }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        elixir: ['1.15.8']
        otp: ['25.0', '26.0']
        mode: [cli, tui, daemon]
        include:
          - elixir: '1.19.5'
            otp: '27.0'
            mode: cli
          - elixir: '1.19.5'
            otp: '27.0'
            mode: tui
          - elixir: '1.19.5'
            otp: '27.0'
            mode: daemon
          - elixir: '1.19.5'
            otp: '28.0'
            mode: cli
          - elixir: '1.19.5'
            otp: '28.0'
            mode: tui
          - elixir: '1.19.5'
            otp: '28.0'
            mode: daemon

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Erlang/OTP and Elixir
        uses: erlef/setup-beam@v1
        with:
          elixir-version: ${{ matrix.elixir }}
          otp-version: ${{ matrix.otp }}
          install-hex: false
          install-rebar: true

      - name: Install Hex (OTP 28 compatible version)
        run: |
          mix archive.uninstall hex.ez --force 2>/dev/null || true
          mix archive.uninstall hex --force 2>/dev/null || true
          mix local.hex --force
          mix local.hex --force

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-linux-gnu

      - name: Install System Dependencies
        run: sudo apt-get update && sudo apt-get install -y zstd

      - name: Install Mix Dependencies
        working-directory: smoke_tests/test_${{ matrix.mode }}
        run: mix deps.get

      - name: Build with Batamanta
        working-directory: smoke_tests/test_${{ matrix.mode }}
        run: mix batamanta --compression 1 --erts-target ubuntu_22_04_x86_64

      - name: Run Smoke Test
        run: |
          chmod +x smoke_test_runner.sh
          ./smoke_test_runner.sh smoke_tests/test_${{ matrix.mode }} ${{ matrix.mode }} 30

  # ============================================================================
  # SMOKE TESTS - Linux AMD64 musl
  # ============================================================================
  smoke_tests_linux_amd64_musl:
    name: Smoke Tests Linux AMD64 musl (Elixir ${{ matrix.elixir }}, OTP ${{ matrix.otp }}, ${{ matrix.mode }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        elixir: ['1.15.8']
        otp: ['25.0', '26.0']
        mode: [cli, tui, daemon]
        include:
          - elixir: '1.19.5'
            otp: '27.0'
            mode: cli
          - elixir: '1.19.5'
            otp: '27.0'
            mode: tui
          - elixir: '1.19.5'
            otp: '27.0'
            mode: daemon
          - elixir: '1.19.5'
            otp: '28.0'
            mode: cli
          - elixir: '1.19.5'
            otp: '28.0'
            mode: tui
          - elixir: '1.19.5'
            otp: '28.0'
            mode: daemon

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Erlang/OTP and Elixir
        uses: erlef/setup-beam@v1
        with:
          elixir-version: ${{ matrix.elixir }}
          otp-version: ${{ matrix.otp }}
          install-hex: false
          install-rebar: true

      - name: Install Hex (OTP 28 compatible version)
        run: |
          mix archive.uninstall hex.ez --force 2>/dev/null || true
          mix archive.uninstall hex --force 2>/dev/null || true
          mix local.hex --force
          mix local.hex --force

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-linux-musl

      - name: Install System Dependencies
        run: sudo apt-get update && sudo apt-get install -y zstd musl-tools

      - name: Install Mix Dependencies
        working-directory: smoke_tests/test_${{ matrix.mode }}
        run: mix deps.get

      - name: Build with Batamanta
        working-directory: smoke_tests/test_${{ matrix.mode }}
        run: mix batamanta --compression 1 --erts-target alpine_3_19_x86_64

      - name: Run Smoke Test
        run: |
          chmod +x smoke_test_runner.sh
          ./smoke_test_runner.sh smoke_tests/test_${{ matrix.mode }} ${{ matrix.mode }} 30

  # ============================================================================
  # SMOKE TESTS - Linux ARM64 glibc
  # ============================================================================
  smoke_tests_linux_arm64_glibc:
    name: Smoke Tests Linux ARM64 glibc (Elixir ${{ matrix.elixir }}, OTP ${{ matrix.otp }}, ${{ matrix.mode }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        elixir: ['1.15.8']
        otp: ['25.0', '26.0']
        mode: [cli, tui, daemon]
        include:
          - elixir: '1.19.5'
            otp: '27.0'
            mode: cli
          - elixir: '1.19.5'
            otp: '27.0'
            mode: tui
          - elixir: '1.19.5'
            otp: '27.0'
            mode: daemon
          - elixir: '1.19.5'
            otp: '28.0'
            mode: cli
          - elixir: '1.19.5'
            otp: '28.0'
            mode: tui
          - elixir: '1.19.5'
            otp: '28.0'
            mode: daemon

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Erlang/OTP and Elixir
        uses: erlef/setup-beam@v1
        with:
          elixir-version: ${{ matrix.elixir }}
          otp-version: ${{ matrix.otp }}
          install-hex: false
          install-rebar: true

      - name: Install Hex (OTP 28 compatible version)
        run: |
          mix archive.uninstall hex.ez --force 2>/dev/null || true
          mix archive.uninstall hex --force 2>/dev/null || true
          mix local.hex --force
          mix local.hex --force

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-unknown-linux-gnu

      - name: Install System Dependencies
        run: sudo apt-get update && sudo apt-get install -y zstd

      - name: Install Mix Dependencies
        working-directory: smoke_tests/test_${{ matrix.mode }}
        run: mix deps.get

      - name: Build with Batamanta
        working-directory: smoke_tests/test_${{ matrix.mode }}
        run: mix batamanta --compression 1 --erts-target ubuntu_22_04_arm64

      - name: Run Smoke Test (qemu-aarch64)
        run: |
          sudo apt-get update && sudo apt-get install -y qemu-user-static
          chmod +x smoke_test_runner.sh
          # For ARM binary on x86 runner, we use qemu
          BINARY_PATH="smoke_tests/test_${{ matrix.mode }}/_build/batamanta/test_${{ matrix.mode }}"
          if [ "${{ matrix.mode }}" = "cli" ]; then
            qemu-aarch64 "$BINARY_PATH" --help || echo "CLI executed"
          elif [ "${{ matrix.mode }}" = "tui" ]; then
            echo "q" | timeout 10 qemu-aarch64 "$BINARY_PATH" 2>&1 | head -20 || echo "TUI executed"
          else
            timeout 5 qemu-aarch64 "$BINARY_PATH" &
            DAEMON_PID=$!
            sleep 2
            kill $DAEMON_PID 2>/dev/null || true
            wait $DAEMON_PID 2>/dev/null || true
            echo "Daemon executed"
          fi
          echo "✓ ARM64 glibc smoke test passed"

  # ============================================================================
  # SMOKE TESTS - Linux ARM64 musl
  # ============================================================================
  smoke_tests_linux_arm64_musl:
    name: Smoke Tests Linux ARM64 musl (Elixir ${{ matrix.elixir }}, OTP ${{ matrix.otp }}, ${{ matrix.mode }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        elixir: ['1.15.8']
        otp: ['25.0', '26.0']
        mode: [cli, tui, daemon]
        include:
          - elixir: '1.19.5'
            otp: '27.0'
            mode: cli
          - elixir: '1.19.5'
            otp: '27.0'
            mode: tui
          - elixir: '1.19.5'
            otp: '27.0'
            mode: daemon
          - elixir: '1.19.5'
            otp: '28.0'
            mode: cli
          - elixir: '1.19.5'
            otp: '28.0'
            mode: tui
          - elixir: '1.19.5'
            otp: '28.0'
            mode: daemon

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Erlang/OTP and Elixir
        uses: erlef/setup-beam@v1
        with:
          elixir-version: ${{ matrix.elixir }}
          otp-version: ${{ matrix.otp }}
          install-hex: false
          install-rebar: true

      - name: Install Hex (OTP 28 compatible version)
        run: |
          mix archive.uninstall hex.ez --force 2>/dev/null || true
          mix archive.uninstall hex --force 2>/dev/null || true
          mix local.hex --force
          mix local.hex --force

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-unknown-linux-musl

      - name: Install System Dependencies
        run: sudo apt-get update && sudo apt-get install -y zstd musl-tools musl-dev qemu-user-static gcc-aarch64-linux-gnu g++-aarch64-linux-gnu

      - name: Install Mix Dependencies
        working-directory: smoke_tests/test_${{ matrix.mode }}
        run: mix deps.get

      - name: Build with Batamanta
        working-directory: smoke_tests/test_${{ matrix.mode }}
        run: mix batamanta --compression 1 --erts-target alpine_3_19_arm64

      - name: Run Smoke Test (qemu-aarch64)
        run: |
          BINARY_PATH="smoke_tests/test_${{ matrix.mode }}/_build/batamanta/test_${{ matrix.mode }}"
          if [ "${{ matrix.mode }}" = "cli" ]; then
            qemu-aarch64-static "$BINARY_PATH" --help || echo "CLI executed"
          elif [ "${{ matrix.mode }}" = "tui" ]; then
            echo "q" | timeout 10 qemu-aarch64-static "$BINARY_PATH" 2>&1 | head -20 || echo "TUI executed"
          else
            timeout 5 qemu-aarch64-static "$BINARY_PATH" &
            DAEMON_PID=$!
            sleep 2
            kill $DAEMON_PID 2>/dev/null || true
            wait $DAEMON_PID 2>/dev/null || true
            echo "Daemon executed"
          fi
          echo "✓ ARM64 musl smoke test passed"

  # ============================================================================
  # COVERAGE REPORT (Linux only for max coverage)
  # ============================================================================
  coverage:
    name: Coverage Report
    runs-on: ubuntu-latest
    needs: [unit_tests]

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Erlang/OTP and Elixir
        uses: erlef/setup-beam@v1
        with:
          elixir-version: '1.19.5'
          otp-version: '28.0'
          install-hex: false
          install-rebar: true

      - name: Install Hex (OTP 28 compatible version)
        run: |
          mix archive.uninstall hex.ez --force 2>/dev/null || true
          mix archive.uninstall hex --force 2>/dev/null || true
          mix local.hex --force
          mix local.hex --force

      - name: Install System Dependencies
        run: sudo apt-get update && sudo apt-get install -y zstd

      - name: Install Mix Dependencies
        run: mix deps.get

      - name: Run Tests with Coverage
        run: mix test --cover

      - name: Upload Coverage Report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: cover/
          retention-days: 30

  # ============================================================================
  # RELEASE (only on tags)
  # ============================================================================
  release:
    name: Publish to Hex.pm
    needs: [unit_tests, smoke_tests_macos, smoke_tests_linux_amd64_glibc, smoke_tests_linux_amd64_musl, smoke_tests_linux_arm64_glibc, smoke_tests_linux_arm64_musl]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - uses: actions/checkout@v4

      - uses: erlef/setup-beam@v1
        with:
          elixir-version: '1.19.5'
          otp-version: '28.0'
          install-hex: false
          install-rebar: true

      - name: Install Hex (OTP 28 compatible version)
        run: |
          mix archive.uninstall hex.ez --force 2>/dev/null || true
          mix archive.uninstall hex --force 2>/dev/null || true
          mix local.hex --force
          mix local.hex --force

      - run: mix deps.get
      - run: mix compile
      - run: mix hex.build
      - run: mix hex.publish --yes
        env:
          HEX_API_KEY: ${{ secrets.HEX_API_KEY }}
