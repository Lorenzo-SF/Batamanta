name: CI - Smoke Tests Matrix

on:
  push:
    branches: [ main ]
    tags: [ 'v*' ]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  unit_tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
      - name: Setup Erlang/OTP and Elixir
        uses: erlef/setup-beam@v1
        with:
          elixir-version: '1.15.8'
          otp-version: '25.0'
          install-hex: true
          install-rebar: true
      - name: Install System Dependencies
        run: sudo apt-get update && sudo apt-get install -y zstd
      - name: Install Mix Dependencies
        run: mix deps.get
      - name: Run Tests
        run: mix test
      - name: Run Credo
        run: mix credo --strict

  smoke_tests:
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Linux AMD64 glibc (1.15.8, OTP 25, cli)
            runner: ubuntu-latest
            elixir: '1.15.8'
            otp: '25.0'
            mode: cli
            rust_target: x86_64-unknown-linux-gnu
            erts_target: ubuntu_22_04_x86_64
          - name: Linux AMD64 glibc (1.19.5, OTP 28, cli)
            runner: ubuntu-latest
            elixir: '1.19.5'
            otp: '28.0'
            mode: cli
            rust_target: x86_64-unknown-linux-gnu
            erts_target: ubuntu_22_04_x86_64
          - name: Linux AMD64 musl (1.15.8, OTP 25, cli)
            runner: ubuntu-latest
            elixir: '1.15.8'
            otp: '25.0'
            mode: cli
            rust_target: x86_64-unknown-linux-musl
            erts_target: alpine_3_19_x86_64
          - name: Linux AMD64 musl (1.19.5, OTP 28, cli)
            runner: ubuntu-latest
            elixir: '1.19.5'
            otp: '28.0'
            mode: cli
            rust_target: x86_64-unknown-linux-musl
            erts_target: alpine_3_19_x86_64
          - name: macOS ARM (1.15.8, OTP 25, cli)
            runner: macos-latest
            elixir: '1.15.8'
            otp: '25.0'
            mode: cli
            rust_target: aarch64-apple-darwin
            erts_target: macos_12_arm64
          - name: macOS ARM (1.19.5, OTP 28, cli)
            runner: macos-latest
            elixir: '1.19.5'
            otp: '28.0'
            mode: cli
            rust_target: aarch64-apple-darwin
            erts_target: macos_12_arm64

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
      - name: Setup Erlang/OTP and Elixir
        uses: erlef/setup-beam@v1
        with:
          elixir-version: ${{ matrix.elixir }}
          otp-version: ${{ matrix.otp }}
          install-hex: true
          install-rebar: true
      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust_target }}
      - name: Install System Dependencies
        run: |
          if [ "${{ matrix.runner }}" = "macos-latest" ]; then
            brew install zstd
          elif echo "${{ matrix.erts_target }}" | grep -q musl; then
            sudo apt-get update && sudo apt-get install -y zstd musl-tools musl-dev
          else
            sudo apt-get update && sudo apt-get install -y zstd
          fi
      - name: Install Mix Dependencies
        working-directory: smoke_tests/test_${{ matrix.mode }}
        run: mix deps.get
      - name: Build with Batamanta
        working-directory: smoke_tests/test_${{ matrix.mode }}
        run: mix batamanta --compression 1 --erts-target ${{ matrix.erts_target }}
      - name: Run Smoke Test
        run: |
          chmod +x smoke_test_runner.sh
          ./smoke_test_runner.sh smoke_tests/test_${{ matrix.mode }} ${{ matrix.mode }} 30

  coverage:
    name: Coverage Report
    runs-on: ubuntu-latest
    needs: [unit_tests]
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
      - name: Setup Erlang/OTP and Elixir
        uses: erlef/setup-beam@v1
        with:
          elixir-version: '1.15.8'
          otp-version: '25.0'
          install-hex: true
          install-rebar: true
      - name: Install System Dependencies
        run: sudo apt-get update && sudo apt-get install -y zstd
      - name: Install Mix Dependencies
        run: mix deps.get
      - name: Run Tests with Coverage
        run: mix test --cover
      - name: Upload Coverage Report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: cover/
          retention-days: 30

  release:
    name: Publish to Hex.pm
    needs: [unit_tests, smoke_tests]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/checkout@v4
      - uses: erlef/setup-beam@v1
        with:
          elixir-version: '1.15.8'
          otp-version: '25.0'
      - run: mix deps.get
      - run: mix compile
      - run: mix hex.build
      - run: mix hex.publish --yes
        env:
          HEX_API_KEY: ${{ secrets.HEX_API_KEY }}
