name: CI - Smoke Tests Matrix

on:
  push:
    branches: [ main ]
    tags: [ 'v*' ]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  # ============================================================================
  # UNIT TESTS - Run on minimum supported version
  # ============================================================================
  unit_tests:
    name: Unit Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Erlang/OTP and Elixir
        uses: erlef/setup-beam@v1
        with:
          elixir-version: '1.15.8'
          otp-version: '25.0'
          install-hex: true
          install-rebar: true

      - name: Install System Dependencies
        run: sudo apt-get update && sudo apt-get install -y zstd

      - name: Install Mix Dependencies
        run: mix deps.get

      - name: Run Tests (ExUnit)
        run: mix test

      - name: Run Credo (Code Quality)
        run: mix credo --strict

  # ============================================================================
  # SMOKE TESTS - Edge versions only (min and max supported)
  # ============================================================================
  smoke_tests:
    name: Smoke Tests ${{ matrix.platform }} (${{ matrix.elixir }}, OTP ${{ matrix.otp }}, ${{ matrix.mode }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        platform: ['linux-arm', 'linux-amd64', 'macos-arm']
        libc: ['glibc', 'musl']
        elixir: ['1.15.8', '1.19.5']
        otp: ['25.0', '28.0']
        mode: [cli, tui, daemon]
        # Exclude invalid combinations
        exclude:
          # musl doesn't apply to macOS
          - platform: macos-arm
            libc: musl
          # ARM runner for ARM platform
          - platform: linux-arm
            runner: ubuntu-latest
          - platform: macos-arm
            runner: ubuntu-latest
        include:
          # Linux ARM uses ARM runner
          - platform: linux-arm
            runner: ubuntu-latest
            rust_target: aarch64-unknown-linux-gnu
            erts_target_glibc: ubuntu_22_04_arm64
            erts_target_musl: alpine_3_19_arm64
            qemu: true
          # Linux AMD64 uses standard runner
          - platform: linux-amd64
            runner: ubuntu-latest
            rust_target: x86_64-unknown-linux-gnu
            erts_target_glibc: ubuntu_22_04_x86_64
            erts_target_musl: alpine_3_19_x86_64
            qemu: false
          # macOS ARM uses macOS runner
          - platform: macos-arm
            runner: macos-latest
            rust_target: aarch64-apple-darwin
            erts_target_glibc: macos_12_arm64
            erts_target_musl: null  # musl not supported on macOS
            qemu: false
          # Elixir 1.19.5 requires OTP 28
          - elixir: '1.19.5'
            otp: '28.0'
          # Elixir 1.15.8 requires OTP 25
          - elixir: '1.15.8'
            otp: '25.0'

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Erlang/OTP and Elixir
        uses: erlef/setup-beam@v1
        with:
          elixir-version: ${{ matrix.elixir }}
          otp-version: ${{ matrix.otp }}
          install-hex: true
          install-rebar: true

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust_target }}

      - name: Install System Dependencies
        run: |
          if [ "${{ matrix.platform }}" = "macos-arm" ]; then
            brew install zstd
          elif [ "${{ matrix.libc }}" = "musl" ]; then
            sudo apt-get update && sudo apt-get install -y zstd musl-tools musl-dev
          else
            sudo apt-get update && sudo apt-get install -y zstd
          fi

      - name: Install QEMU (for ARM emulation)
        if: ${{ matrix.qemu }}
        run: sudo apt-get update && sudo apt-get install -y qemu-user-static

      - name: Install Mix Dependencies
        working-directory: smoke_tests/test_${{ matrix.mode }}
        run: mix deps.get

      - name: Compile application
        working-directory: smoke_tests/test_${{ matrix.mode }}
        run: MIX_ENV=prod mix compile

      - name: Build with Batamanta
        working-directory: smoke_tests/test_${{ matrix.mode }}
        run: |
          if [ "${{ matrix.libc }}" = "glibc" ]; then
            mix batamanta --compression 1 --erts-target ${{ matrix.erts_target_glibc }}
          elif [ "${{ matrix.erts_target_musl }}" != "null" ]; then
            mix batamanta --compression 1 --erts-target ${{ matrix.erts_target_musl }}
          else
            mix batamanta --compression 1
          fi

      - name: Run Smoke Test
        run: |
          chmod +x smoke_test_runner.sh
          if [ "${{ matrix.qemu }}" = "true" ]; then
            # Run with QEMU for ARM emulation
            export QEMU_EXEC=1
            ./smoke_test_runner.sh smoke_tests/test_${{ matrix.mode }} ${{ matrix.mode }} 30 qemu-${{ matrix.platform == 'linux-arm' && 'aarch64' || 'x86_64' }}-static
          else
            ./smoke_test_runner.sh smoke_tests/test_${{ matrix.mode }} ${{ matrix.mode }} 30
          fi

  # ============================================================================
  # COVERAGE REPORT
  # ============================================================================
  coverage:
    name: Coverage Report
    runs-on: ubuntu-latest
    needs: [unit_tests]

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Erlang/OTP and Elixir
        uses: erlef/setup-beam@v1
        with:
          elixir-version: '1.15.8'
          otp-version: '25.0'
          install-hex: true
          install-rebar: true

      - name: Install System Dependencies
        run: sudo apt-get update && sudo apt-get install -y zstd

      - name: Install Mix Dependencies
        run: mix deps.get

      - name: Run Tests with Coverage
        run: mix test --cover

      - name: Upload Coverage Report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: cover/
          retention-days: 30

  # ============================================================================
  # RELEASE (only on tags)
  # ============================================================================
  release:
    name: Publish to Hex.pm
    needs: [unit_tests, smoke_tests]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - uses: actions/checkout@v4

      - uses: erlef/setup-beam@v1
        with:
          elixir-version: '1.15.8'
          otp-version: '25.0'

      - run: mix deps.get
      - run: mix compile
      - run: mix hex.build
      - run: mix hex.publish --yes
        env:
          HEX_API_KEY: ${{ secrets.HEX_API_KEY }}
